name: Run jobs

# Durable job-queue worker (roadmap V4). Drains the `jobs` table: scheduled
# publishing, post-sync auto-transcribe, and weekly digest sends. Vercel Hobby
# only allows once-a-day crons and both slots are used by the snapshot/token
# refreshers, so this frequent worker runs from GitHub Actions instead of
# vercel.json. It calls /api/cron/run-jobs, authenticated with CRON_SECRET (see
# lib/utils/cron.ts). Once on Vercel Pro, prefer a Vercel cron
# ("*/2 * * * *") and you can disable this workflow (see docs/cron-cadence.md).
#
# One-time setup — repo Settings → Secrets and variables → Actions:
#   Secret    CRON_SECRET   = the same value as the Vercel env var CRON_SECRET
#   Variable  APP_BASE_URL  = https://<your-production-domain>   (no trailing slash)
#
# Note: GitHub's scheduled runs are best-effort and can be delayed under load;
# 5 minutes is the finest cron granularity Actions supports. Scheduled workflows
# run on the default branch only and auto-pause after 60 days of repo inactivity.

on:
  schedule:
    # Every 5 minutes — the publish cadence the roadmap (L8) targets.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  run-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Drain the job queue
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
        run: |
          if [ -z "$CRON_SECRET" ] || [ -z "$APP_BASE_URL" ]; then
            echo "Missing CRON_SECRET secret or APP_BASE_URL variable — see workflow header." >&2
            exit 1
          fi
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_BASE_URL}/api/cron/run-jobs"
