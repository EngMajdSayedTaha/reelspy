name: Weekly digest

# Vercel Hobby only allows once-a-day crons and both slots are used by the
# snapshot/token refreshers, so the weekly niche digest runs from GitHub Actions
# instead of vercel.json. It calls /api/cron/weekly-digest, authenticated with
# CRON_SECRET (see lib/utils/cron.ts). No-ops until RESEND_API_KEY/EMAIL_FROM are
# set on Vercel.
#
# One-time setup — repo Settings → Secrets and variables → Actions:
#   Secret    CRON_SECRET   = the same value as the Vercel env var CRON_SECRET
#   Variable  APP_BASE_URL  = https://<your-production-domain>   (no trailing slash)
#
# Note: GitHub's scheduled runs are best-effort and can be delayed under load.
# Scheduled workflows run on the default branch only and auto-pause after 60 days
# of repo inactivity.

on:
  schedule:
    # Mondays 08:00 UTC — start-of-week nudge.
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger weekly digest
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
        run: |
          if [ -z "$CRON_SECRET" ] || [ -z "$APP_BASE_URL" ]; then
            echo "Missing CRON_SECRET secret or APP_BASE_URL variable — see workflow header." >&2
            exit 1
          fi
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_BASE_URL}/api/cron/weekly-digest"
